<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DriveEasy - Vehicle Rental</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0d1b2a;color:#e8edf2;gap:16px;">
            <div style="width:36px;height:36px;border:4px solid #243d57;border-top-color:#2196f3;border-radius:50%;animation:spin .7s linear infinite;"></div>
            <span style="font-size:18px;font-family:Segoe UI,sans-serif;">Loading DriveEasy...</span>
        </div>
    </div>
    <div id="blazor-error-ui">An unhandled error occurred. <a href="" class="reload">Reload</a></div>
    <script src="_framework/blazor.webassembly.js"></script>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
