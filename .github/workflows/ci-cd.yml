name: CI/CD — VehicleRental

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Build & Test ──────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore VehicleRental.sln

      - name: Build solution
        run: dotnet build VehicleRental.sln --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/VehicleRental.Tests/VehicleRental.Tests.csproj --no-build --configuration Release --verbosity normal

